# v* 태그를 푸시하면 GitHub 서버에서 .deb를 빌드해 릴리스에 첨부한다.
# 사용법:  git tag v0.2.0 && git push origin v0.2.0
# (ubuntu-22.04에서 빌드 — 22.04/24.04 양쪽에서 동작하는 glibc 하한 확보)
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Tauri 시스템 의존성 설치
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2

      - run: bun install
      - run: cargo build --release -p amux-cli # .deb에 /usr/bin/amux로 동봉됨
      - run: bunx tauri build

      - name: 릴리스 생성 + .deb 첨부
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            target/release/bundle/deb/*.deb --generate-notes \
          || gh release upload "${{ github.ref_name }}" \
            target/release/bundle/deb/*.deb --clobber
